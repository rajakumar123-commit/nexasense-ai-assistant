# ============================================================
# NexaSense AI Assistant — V5.0 Production (Enterprise Hardened)
# ============================================================

# ── LOGGING POLICY (Shared Anchor) ─────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── PostgreSQL (pgvector) ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexasense-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nexasense123
      POSTGRES_DB: nexasense
    # Resource Guard: Postgres is the heart; don't let it be starved
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - data-tier
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d nexasense" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Redis (Queue + Cache) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexasense-redis
    restart: always
    # ✅ HARDENED: Use 'noeviction' for BullMQ reliability (prevents job data loss)
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    networks:
      - data-tier
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
    logging: *default-logging

  # ── ChromaDB ──────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:0.6.3
    container_name: nexasense-chroma
    restart: always
    environment:
      - IS_PERSISTENT=TRUE
    deploy:
      resources:
        limits:
          memory: 1G # Chroma can be RAM heavy during indexing
    networks:
      - data-tier
    volumes:
      - chroma_data:/data
    logging: *default-logging

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexasense-backend
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    # Enterprise Logic: Connects to both worlds
    networks:
      - frontend-tier
      - data-tier
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - model_cache:/app/.model-cache
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
    logging: *default-logging

  # ── Worker (Scraper + Embedder) ───────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexasense-worker
    restart: always
    init: true # ✅ CRITICAL: Reaps zombie Chrome processes
    # ✅ FIXED: Explicit DNS for AWS/Docker network reliability
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    deploy:
      resources:
        limits:
          memory: 1.5G # High limit for Puppeteer + Transformers
    networks:
      - data-tier
    shm_size: "1gb" # ✅ UPGRADED: Maximum stability for headless Chrome
    command: node src/workers/ingestion.worker.js
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - model_cache:/app/.model-cache
    logging: *default-logging

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID}
        VITE_API_URL: ${VITE_API_URL}
        VITE_ALLOWED_FILE_TYPES: ${VITE_ALLOWED_FILE_TYPES}
    container_name: nexasense-frontend
    restart: always
    networks:
      - frontend-tier
    logging: *default-logging

  # ── Caddy (SSL/Proxy) ─────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: nexasense-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend-tier
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    logging: *default-logging

  # ── Monitoring (Prometheus + Grafana) ─────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nexasense-prometheus
    networks:
      - data-tier
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    container_name: nexasense-grafana
    environment:
      - GF_SERVER_ROOT_URL=https://rajakumar-nexasense-ai.online/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - frontend-tier
      - data-tier
    volumes:
      - grafana_data:/var/lib/grafana
    logging: *default-logging

# ── NETWORKS ───────────────────────────────────────────────
networks:
  frontend-tier:
    driver: bridge
  data-tier:
    internal: true # ✅ External traffic cannot hit your DBs directly

# ── VOLUMES ────────────────────────────────────────────────
volumes:
  postgres_data:
  chroma_data:
  redis_data:
  logs_data:
  model_cache:
  uploads_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data: