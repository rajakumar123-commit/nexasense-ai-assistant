# ============================================================
# docker-compose.yml — NexaSense AI Assistant
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexasense-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nexasense123
      POSTGRES_DB: nexasense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d nexasense" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexasense-redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB ──────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:0.6.3
    container_name: nexasense-chroma
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexasense-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:nexasense123@postgres:5432/nexasense
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chroma:8000
      TRANSFORMERS_OFFLINE: "0"
      XENOVA_CACHE_DIR: /app/.model-cache
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - model_cache:/app/.model-cache
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Worker ────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexasense-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:nexasense123@postgres:5432/nexasense
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chroma:8000
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - model_cache:/app/.model-cache
    # ──────────────────────────────────────────────────────
    # PUPPETEER KE LIYE ZAROORI
    # Default Docker /dev/shm = 64MB — Chromium crash karta hai
    # shm_size badha ke 256MB karo
    # ──────────────────────────────────────────────────────
    shm_size: "256mb"
    command: node src/workers/ingestion.worker.js
    # Worker healthcheck — detects silent crashes
    healthcheck:
      test: [ "CMD-SHELL", "ps aux | grep 'ingestion.worker' | grep -v grep || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (FIXED) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Read from root .env
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID}
        VITE_API_URL: ${VITE_API_URL}
    container_name: nexasense-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy

  # ── Caddy Reverse Proxy (HTTPS) ───────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: nexasense-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nexasense-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - backend

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nexasense-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── Test Runner ────────────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:nexasense123@postgres:5432/nexasense
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chroma:8000
      NODE_ENV: test
    volumes:
      - uploads_data:/app/uploads
    command: node tests/rag.test.js
    profiles:
      - test

volumes:
  postgres_data:
  chroma_data:
  redis_data:
  logs_data:
  model_cache:
  uploads_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
