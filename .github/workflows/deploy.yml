name: Deploy NexaSense to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null && echo "SSH key valid" || { echo "SSH key INVALID"; exit 1; }

      - name: Deploy to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=60 \
              -i ~/.ssh/id_rsa \
              ${EC2_USER}@${EC2_HOST} \
              bash << 'ENDSSH'

          set -euo pipefail
          PROJECT_DIR="/home/ubuntu/nexasense-ai-assistant"

          echo "=== SERVER INFO ==="
          whoami
          curl -s ifconfig.me

          echo "=== STEP 1: Update Code ==="
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "First deploy — cloning..."
            cd /home/ubuntu
            git clone https://github.com/rajakumar123-commit/nexasense-ai-assistant.git
            cd nexasense-ai-assistant
          else
            echo "Updating existing code..."
            cd "$PROJECT_DIR"
            git fetch --all
            git reset --hard origin/main
          fi
          echo "Deployed commit: $(git log --oneline -1)"

          echo "=== STEP 2: Ensure .env exists ==="
          if [ ! -f ".env" ]; then
            echo "WARNING: .env not found — copying from .env.example"
            cp .env.example .env
          else
            echo ".env exists — preserving it"
          fi

          echo "=== STEP 3: Build and Restart ==="
          if sudo docker compose version > /dev/null 2>&1; then
            DC="sudo docker compose"
          else
            DC="sudo docker-compose"
          fi
          echo "Using: $DC"

          $DC pull --ignore-pull-failures || true
          $DC build
          
          echo "Stopping old containers to prevent name conflicts..."
          $DC down || true
          
          echo "Starting new containers..."
          $DC up -d --remove-orphans
          
          echo "Cleaning up dead containers and unused images to free up EC2 disk space..."
          sudo docker system prune -f || true

          echo "=== STEP 4: Health Check ==="
          sleep 30
          $DC ps
          $DC exec -T backend curl -sf http://localhost:3000/api/health && echo "Backend healthy" || echo "Backend still starting"

          echo "=== DEPLOY COMPLETE ==="
          ENDSSH
