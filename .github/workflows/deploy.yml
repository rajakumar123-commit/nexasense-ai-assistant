name: Deploy NexaSense to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_rsa
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            echo "--- Nuclear Cleanup: Deleting project and images ---"
            curl -s ifconfig.me && echo " (Server IP)"
            sudo docker-compose down --rmi all --remove-orphans || true
            sudo docker system prune -af --volumes || true
            cd /home/${{ secrets.EC2_USERNAME }}
            sudo rm -rf nexasense-ai-assistant
            
            echo "--- Fresh Clone from scratch ---"
            git clone https://github.com/rajakumar123-commit/nexasense-ai-assistant.git
            cd nexasense-ai-assistant
            
            echo "--- Building Fresh Images from 0% Cache ---"
            sudo docker-compose build --no-cache --pull
            
            echo "--- Starting Clean Services ---"
            sudo docker-compose up -d --force-recreate
            echo "--- Deployment 100% Guaranteed & Complete ---"
          EOF
