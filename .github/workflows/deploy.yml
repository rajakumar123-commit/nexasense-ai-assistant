name: Deploy NexaSense to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Validate the key is well-formed
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null && echo "✅ SSH key is valid" || { echo "❌ SSH key is INVALID — check EC2_SSH_KEY secret"; exit 1; }

      - name: Verify SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -i ~/.ssh/id_rsa \
              ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
              "echo SSH_OK && whoami"

      - name: Deploy to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=60 \
              -i ~/.ssh/id_rsa \
              ${EC2_USER}@${EC2_HOST} \
              bash << 'ENDSSH'

          set -euo pipefail
          PROJECT_DIR="/home/ubuntu/nexasense-ai-assistant"

          echo "=== SERVER INFO ==="
          echo "User: $(whoami) | IP: $(curl -s ifconfig.me)"

          echo "=== STEP 1: Update Code ==="
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "First deploy — cloning..."
            cd /home/ubuntu
            git clone https://github.com/rajakumar123-commit/nexasense-ai-assistant.git
            cd nexasense-ai-assistant
          else
            echo "Updating existing code..."
            cd "$PROJECT_DIR"
            git fetch --all
            git reset --hard origin/main
          fi
          echo "Deployed commit: $(git log --oneline -1)"

          echo "=== STEP 2: Ensure .env exists ==="
          if [ ! -f ".env" ]; then
            echo "WARNING: .env not found — copying from .env.example"
            echo "Manually edit /home/ubuntu/nexasense-ai-assistant/.env with real API keys!"
            cp .env.example .env
          else
            echo ".env exists — preserving it"
          fi

          echo "=== STEP 3: Build & Restart ==="
          if sudo docker compose version > /dev/null 2>&1; then
            DC="sudo docker compose"
          else
            DC="sudo docker-compose"
          fi
          echo "Using: $DC"

          # Pull latest base images (postgres, redis, chroma, caddy)
          $DC pull --ignore-pull-failures || true

          # Build app images (uses layer cache — fast on updates)
          $DC build

          # Restart only changed containers, keep volumes intact
          $DC up -d --remove-orphans

          echo "=== STEP 4: Health Check ==="
          sleep 30
          $DC ps
          echo ""
          curl -sf http://localhost:3000/api/health \
            && echo "✅ Backend is healthy" \
            || echo "⚠️  Backend still starting up (check logs: sudo docker compose logs backend)"

          echo ""
          echo "=== ✅ DEPLOY COMPLETE ==="
          ENDSSH
