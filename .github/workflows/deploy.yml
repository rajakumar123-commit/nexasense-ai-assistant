name: Deploy NexaSense to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_rsa
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd nexasense-ai-assistant
            echo "--- Current Commit & Dockerfile on Server ---"
            git fetch --all
            git reset --hard origin/main
            git rev-parse HEAD
            cat Dockerfile | grep CACHEBUST || echo "CACHEBUST NOT FOUND!"
            echo "--- Forced Rebuild of Services ---"
            # Attempting both v1 and v2 for maximum compatibility
            sudo docker-compose down || sudo docker compose down
            sudo docker-compose build --no-cache frontend backend || sudo docker compose build --no-cache frontend backend
            sudo docker-compose up -d --force-recreate || sudo docker compose up -d --force-recreate
            echo "--- Deployment Complete ---"
          EOF
